spring.application.name=yeolo

# ===== DataSource (H2 in-memory, MySQL 호환 모드) =====
spring.datasource.url=jdbc:h2:mem:yeolo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# ===== Google OAuth (테스트 더미) =====
google.oauth.client-id=test-client-id
google.oauth.client-secret=test-client-secret
google.oauth.redirect-uri=http://localhost/callback
google.oauth.token-uri=https://oauth2.googleapis.com/token
google.oauth.userinfo-uri=https://www.googleapis.com/oauth2/v3/userinfo

# ===== JWT (테스트 더미 시크릿, HS256용 32바이트 이상) =====
jwt.secret=test-secret-key-for-yeolo-jwt-hs256-please-change-0123456789
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=1209600000
