spring.application.name=yeolo

# ===== Graceful shutdown =====
# 롤링 배포/종료 시 진행 중인 SSE 파이프라인이 끊기지 않도록 graceful 종료한다.
# 파드 grace(90s) - preStop(15s) = 75s 안쪽, 최장 스트림(약 30s)보다는 큰 값으로 둔다.
# (k8s terminationGracePeriod/preStop 등 배포 측 설정은 인프라 담당 영역.)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=60s

# ===== DataSource (MySQL) =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/yeolo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
# 스키마는 엔티티가 근거. local=update, dev/prod=validate (docs/architecture.md 2)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ===== Google OAuth (API-FB-1) =====
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:}
google.oauth.token-uri=https://oauth2.googleapis.com/token
google.oauth.userinfo-uri=https://www.googleapis.com/oauth2/v3/userinfo

# ===== JWT =====
jwt.secret=${JWT_SECRET:}
# Access 1시간, Refresh 14일 (ms)
jwt.access-token-validity-ms=${JWT_ACCESS_TTL:3600000}
jwt.refresh-token-validity-ms=${JWT_REFRESH_TTL:1209600000}

# ===== AI 내부 API (API-BA-6) =====
# 내부 인증 키(X-Internal-Api-Key)는 커밋 금지 — 환경변수/로컬 설정으로 주입.
ai.internal.base-url=${AI_BASE_URL:http://localhost:8000}
ai.internal.api-key=${AI_INTERNAL_API_KEY:}

# ===== AI 코스 생성 (API-FB-4 / API-BA-1) =====
# provider: stub(기본) | internal. internal 선택 시 /internal/ai/courses(SSE) 연동(TSK-7 #4).
ai.course.provider=${AI_COURSE_PROVIDER:stub}

# ===== Reverse Geocode (DOM-5) =====
# provider: stub(기본) | google. google 선택 시 API 키 필요(커밋 금지).
geocode.provider=${GEOCODE_PROVIDER:stub}
geocode.google.api-key=${GOOGLE_MAPS_API_KEY:}
geocode.google.geocode-url=https://maps.googleapis.com/maps/api/geocode/json
geocode.google.places-nearby-url=https://maps.googleapis.com/maps/api/place/nearbysearch/json
geocode.google.nearby-radius=${GEOCODE_NEARBY_RADIUS:100}
geocode.google.language=ko
