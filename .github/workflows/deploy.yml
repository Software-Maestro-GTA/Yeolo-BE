name: deploy

# main 브랜치 push 만 배포한다.
# OIDC trust 가 ref:refs/heads/main 으로 고정돼 있어 다른 ref 에서는 role assume 자체가 불가.
# (확장하려면 인프라 repo github-oidc.tf:51-55 의 sub 조건을 먼저 넓혀야 함)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 최소 권한: OIDC 토큰 발급 + 소스 read 만.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EKS_CLUSTER: ${{ vars.EKS_CLUSTER }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  DEPLOYMENT_NAME: ${{ vars.DEPLOYMENT_NAME }}
  # 이미지 태그 = immutable git commit SHA. mutable 태그로 배포 금지.
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    # workflow_dispatch 로 실행하더라도 main 에서만 동작(OIDC trust 와 일치).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image reference
        id: meta
        run: echo "image=${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # 승인 게이트를 걸 수 있도록 environment 지정.
    environment: dev
    # 같은 앱의 배포를 직렬화한다. 진행 중 배포는 취소하지 않고 대기.
    concurrency:
      group: deploy-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      # container name 미지정 시 deployment name 을 사용.
      CONTAINER_NAME: ${{ vars.CONTAINER_NAME || vars.DEPLOYMENT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER"

      # 앱 소유 env ConfigMap(was-env). repo 에 매니페스트가 있을 때만 반영.
      # envFrom 으로 로드되므로 값만 바뀌어도 파드는 자동 재시작되지 않는다.
      # 아래 set image 로 이미지도 함께 바뀌면 새 파드가 뜨며 자연히 반영된다.
      # (이미지 변경 없이 env 만 바꾸는 경우엔 rollout restart 가 필요 — 이 파이프라인은
      #  항상 새 SHA 이미지를 배포하므로 해당 안 됨)
      - name: Apply env ConfigMap (if present)
        run: |
          if [ -f k8s/was-env.yaml ]; then
            kubectl -n "$K8S_NAMESPACE" apply -f k8s/was-env.yaml
          elif [ -f was-env.yaml ]; then
            kubectl -n "$K8S_NAMESPACE" apply -f was-env.yaml
          else
            echo "no env ConfigMap manifest in repo — skipping"
          fi

      # CD 는 이미지 태그만 교체한다. apply -k / 전체 매니페스트 재apply 금지(:bootstrap 회귀).
      - name: Set image
        run: |
          kubectl -n "$K8S_NAMESPACE" set image \
            "deployment/${DEPLOYMENT_NAME}" \
            "${CONTAINER_NAME}=${IMAGE}"

      # 무중단(rolling) rollout 검증.
      - name: Verify rollout
        run: kubectl -n "$K8S_NAMESPACE" rollout status "deployment/${DEPLOYMENT_NAME}" --timeout=5m

      # 실패 시 직전 리비전으로 자동 롤백.
      - name: Rollback on failure
        if: failure()
        run: |
          echo "rollout failed — rolling back deployment/${DEPLOYMENT_NAME}"
          kubectl -n "$K8S_NAMESPACE" rollout undo "deployment/${DEPLOYMENT_NAME}"
          kubectl -n "$K8S_NAMESPACE" rollout status "deployment/${DEPLOYMENT_NAME}" --timeout=5m
